<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🦕 Festa da Helena – 8 Anos!</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
        /* ── ESTILOS PARA A IMAGEM DO CONVITE ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background-color: #fae8f4; /* Rosa extraído exatamente do rodapé da arte */
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 0;
      margin: 0;
    }

    .card {
      background-color: #fae8f4; /* Mesma cor do fundo para sumir com as bordas */
      border-radius: 0;
      padding: 20px 15px;
      width: 100%;
      max-width: 500px;
      min-height: 100vh;
      box-shadow: none; /* Removida a sombra para parecer um app de tela cheia */
      border: none;
    }

    /* ── ESTILOS PARA A IMAGEM DO CONVITE ── */
    .convite-imagem-container {
      position: relative;
      width: calc(100% + 30px);
      margin: -20px -15px 0 -15px;
      overflow: hidden;
      display: block;
    }

    /* 🪄 TRUQUE DE MESTRE: Degradê esfumaçado para a imagem derreter no fundo */
    .convite-imagem-container::after {
      content: '';
      position: absolute;
      bottom: -1px; /* Evita aquela linha branca chata do navegador */
      left: 0;
      width: 100%;
      height: 50px; /* Altura do efeito esfumaçado */
      background: linear-gradient(to bottom, rgba(250, 232, 244, 0) 0%, #fae8f4 100%);
      pointer-events: none; /* Garante que os botões por baixo continuem clicáveis */
    }

    .imagem-fundo {
      width: 100%;
      display: block;
    }

    /* Botões invisíveis que ficam por cima da imagem */
    .btn-invisivel {
      position: absolute;
      background: rgba(255, 255, 255, 0);
      cursor: pointer;
      border-radius: 15px;
    }

    .zona-mapa {
      top: 67%; 
      left: 34.5%;
      width: 31%;
      height: 6.5%;
    }

    .zona-confirmar {
      top: 64.5%; 
      left: 68%;
      width: 29%;
      height: 6.5%;
    }

    /* Área do Admin discretamente abaixo da imagem */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      /* Cor exata do rodapé da imagem para mesclar perfeitamente sem esfumaçar */
      background-color: #fce8f4; 
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 0;
      margin: 0;
    }

    .card {
      background-color: transparent; /* Deixa o fundo transparente para usar a cor do body */
      border-radius: 0;
      padding: 0 15px 20px 15px; /* Tira o espaço do topo para a imagem grudar lá em cima */
      width: 100%;
      max-width: 500px;
      min-height: 100vh;
      box-shadow: none;
      border: none;
    }

    /* ── ESTILOS PARA A IMAGEM DO CONVITE ── */
    .convite-imagem-container {
      position: relative;
      width: calc(100% + 30px);
      margin: 0 -15px 0 -15px; 
      display: block;
    }

    .imagem-fundo {
      width: 100%;
      display: block;
    }

    /* Botões invisíveis que ficam por cima da imagem */
    .btn-invisivel {
      position: absolute;
      background: rgba(255, 255, 255, 0); 
      cursor: pointer;
      border-radius: 15px;
    }

    .zona-mapa {
      top: 67%; 
      left: 34.5%;
      width: 31%;
      height: 6.5%;
    }

    .zona-confirmar {
      top: 64.5%; 
      left: 68%;
      width: 29%;
      height: 6.5%;
    }

    /* ── ADMIN / ÁREA EXCLUSIVA (Abaixo da Imagem) ── */
    .admin-secreto {
      margin: 20px auto 0;
      padding: 10px;
      text-align: center;
    }
    .admin-section { padding-top: 15px; border-top: 2px dotted #f2a6d4; }
    .admin-label { font-size: 13px; color: #a855f7; margin-bottom: 15px; font-weight: 800;}
    .admin-row { display: flex; gap: 10px; justify-content: center; align-items: center; }

    /* ── BOTÕES ROSAS (Isso estava faltando!) ── */
    .btn-pink {
      display: inline-block;
      width: 100%;
      background: linear-gradient(to bottom, #ff5eb0, #e91e8c);
      color: #fff;
      border: 3px solid #fff;
      border-radius: 20px;
      padding: 14px 20px;
      font-family: 'Fredoka One', cursive;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 4px 0 #b30f66, 0 6px 15px rgba(233, 30, 140, 0.3);
      transition: all 0.1s;
      text-align: center;
      text-transform: uppercase;
    }
    .btn-pink:hover { transform: translateY(2px); box-shadow: 0 2px 0 #b30f66; }
    .btn-pink:active { transform: translateY(4px); box-shadow: 0 0 0 #b30f66; }
    .btn-pink:disabled { background: #ccc; box-shadow: 0 4px 0 #999; cursor: not-allowed; border-color: #eee; color: #fff; }

    /* ── FORMULÁRIO E INPUTS ── */
    input[type="text"], input[type="password"], input[type="number"], textarea {
      width: 100%; border: 2px solid #f9c6ef; border-radius: 16px; padding: 12px 14px;
      font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; color: #555;
      background: #fff; outline: none; transition: all 0.2s; box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
    }
    input:focus, textarea:focus { border-color: #ff6bb5; }
    textarea { resize: vertical; height: 90px; }

    .back-btn { background: none; border: none; color: #a855f7; cursor: pointer; font-family: 'Fredoka One', cursive; font-size: 14px; margin-bottom: 14px; padding: 0; }
    .form-emoji { font-size: 52px; text-align: center; display: block; margin-bottom: 5px; }
    h2.form-title { font-family: 'Fredoka One', cursive; color: #c026a8; text-align: center; font-size: 26px; margin-bottom: 20px; }
    label.field-label { display: block; font-size: 14px; font-weight: 800; color: #7c3aed; margin-bottom: 8px; margin-top: 18px; }

    .toggle-row { display: flex; gap: 10px; margin-bottom: 5px; }
    .toggle-btn {
      flex: 1; padding: 14px 0; border-radius: 16px; border: 2px solid #e9d5f5;
      background: #fff; color: #999; font-family: 'Fredoka One', cursive; font-size: 15px;
      cursor: pointer; transition: all 0.15s;
    }
    .toggle-btn.active { border-color: #ff6bb5; background: #fff0f5; color: #c026a8; transform: scale(1.02); box-shadow: 0 4px 10px rgba(255, 107, 181, 0.2);}
    .num-row { display: flex; gap: 15px; }
    .num-row > div { flex: 1; }

    /* ── SUCESSO E ADMIN ── */
    .sucesso-emoji { font-size: 80px; text-align: center; display: block; margin-bottom: 10px; animation: bounce 1s infinite alternate; }
    .sucesso-title { font-family: 'Fredoka One', cursive; color: #c026a8; text-align: center; font-size: 30px; margin-bottom: 15px; }
    .sucesso-text { text-align: center; color: #7c3aed; font-weight: 700; line-height: 1.6; font-size: 15px; }
    .sucesso-info { text-align: center; font-size: 13px; color: #a1a1aa; margin-top: 15px; font-weight: 700;}

    .stats-row { display: flex; gap: 10px; margin-bottom: 20px; }
    .stat-box { flex: 1; border-radius: 16px; padding: 15px 8px; text-align: center; background:#fff;}
    .stat-num { font-family: 'Fredoka One', cursive; font-size: 34px; color: #7c3aed; display: block; line-height: 1;}
    .stat-lbl { font-size: 12px; color: #6b7280; font-weight: 800; display: block; margin-top: 5px; text-transform: uppercase;}

    .resposta-card { border-radius: 16px; padding: 15px; margin-bottom: 12px; }
    .resposta-card.sim { background: #fff; border: 2px solid #6ee7b7; }
    .resposta-card.nao { background: #fff; border: 2px solid #fca5a5; }
    .resposta-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;}
    .resposta-nome { font-weight: 800; color: #1f2937; font-size: 15px; }
    .badge { border-radius: 10px; padding: 4px 10px; font-size: 11px; font-weight: 800; text-transform: uppercase;}
    .badge.sim { background: #10b981; color: #fff; }
    .badge.nao { background: #ef4444; color: #fff; }
    .resposta-detail { font-size: 13px; color: #4b5563; font-weight: 700;}
    .resposta-recado { font-size: 13px; color: #6b7280; font-style: italic; margin-top: 8px; background: rgba(245,245,245,0.8); padding: 8px; border-radius: 8px;}
    .resposta-data { font-size: 11px; color: #9ca3af; margin-top: 8px; font-weight: 600;}
    .empty-msg { text-align: center; color: #9ca3af; font-size: 15px; padding: 30px 0; font-weight: 700;}

    /* ── TRANSIÇÕES DE TELAS ── */
    .tela { display: none; }
    .tela.ativa { display: block; animation: scaleUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

    @keyframes scaleUp { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }

  </style>
</head>
<body>
<div class="card">

  <!-- ══ TELA: CONVITE ══ -->
    <div id="tela-convite" class="tela ativa">
    
    <div class="convite-imagem-container">
      <img src="convite-helena.jpg" alt="Convite da Helena" class="imagem-fundo" />
      
      <a href="https://maps.google.com/?q=Shopping+Via+Brasil+T-Rex+Park" target="_blank" class="btn-invisivel zona-mapa"></a>
      
      <div onclick="ir('tela-form')" class="btn-invisivel zona-confirmar"></div>
    </div>

    <div class="admin-secreto admin-section">
      <p class="admin-label">Área exclusiva da mamãe/papai 🦕</p>
      <div class="admin-row">
        <input type="password" id="admin-senha" placeholder="Senha" />
        <button class="btn-pink" style="width:auto;padding:12px 20px;font-size:14px;" onclick="abrirAdmin()">Ver</button>
      </div>
    </div>

  </div>

  <!-- ══ TELA: FORMULÁRIO ══ -->
  <div id="tela-form" class="tela">
    <button class="back-btn" onclick="ir('tela-convite')">← Voltar</button>
    <span class="form-emoji">🦕</span>
    <h2 class="form-title">Confirmar Presença</h2>

    <label class="field-label">Seu nome completo</label>
    <input type="text" id="f-nome" placeholder="Ex: Ana Silva" />

    <label class="field-label">Você vai à festa?</label>
    <div class="toggle-row">
      <button class="toggle-btn" id="btn-sim" onclick="escolherVem('sim')">✅ Sim, vou!</button>
      <button class="toggle-btn" id="btn-nao" onclick="escolherVem('nao')">❌ Não consigo</button>
    </div>

    <div id="campos-extras" style="display:none;">
      <div class="num-row">
        <div>
          <label class="field-label">Crianças</label>
          <input type="number" id="f-criancas" value="1" min="0" max="10" />
        </div>
        <div>
          <label class="field-label">Adultos</label>
          <input type="number" id="f-adultos" value="1" min="1" max="10" />
        </div>
      </div>
    </div>

    <label class="field-label">Recado para a Helena (opcional) 💜</label>
    <textarea id="f-recado" placeholder="Parabéns, princesa dino! 🦕"></textarea>

    <button class="btn-pink" id="btn-confirmar" onclick="confirmar()" disabled style="margin-top:25px;">
      Confirmar agora! 🍬
    </button>
  </div>

  <!-- ══ TELA: SUCESSO ══ -->
  <div id="tela-sucesso" class="tela">
    <span class="sucesso-emoji" id="sucesso-emoji">🦕</span>
    <h2 class="sucesso-title" id="sucesso-titulo">Uhuuu! Até lá! 🎉</h2>
    <p class="sucesso-text" id="sucesso-texto">
      A Helena vai ficar super feliz de te ver no reino dos dinos e doces! 💜
    </p>
    <p class="sucesso-info">📅 04 de julho · 18h · T-Rex Park</p>
    <button class="btn-pink" onclick="voltarInicio()" style="margin-top:25px;">
      Voltar ao convite
    </button>
  </div>

  <!-- ══ TELA: ADMIN ══ -->
  <div id="tela-admin" class="tela">
    <button class="back-btn" onclick="ir('tela-convite')">← Voltar ao convite</button>
    <h2 class="form-title" style="margin-bottom: 5px;">🦕 Painel da Festinha</h2>
    <p style="text-align:center;color:#a855b5;font-size:14px;font-weight:700;margin-bottom:20px;">
      Controle do estoque de Fini 🎉
    </p>

    <div class="stats-row">
      <div class="stat-box" style="background:#fce4f5; border: 2px solid #f9a8d4;">
        <span class="stat-num" id="stat-confirmados">0</span>
        <span class="stat-lbl">Confirmados</span>
      </div>
      <div class="stat-box" style="background:#f3e4fc; border: 2px solid #c4b5fd;">
        <span class="stat-num" id="stat-criancas">0</span>
        <span class="stat-lbl">Crianças</span>
      </div>
      <div class="stat-box" style="background:#ffe4e6; border: 2px solid #fda4af;">
        <span class="stat-num" id="stat-naovem">0</span>
        <span class="stat-lbl">Não vêm</span>
      </div>
    </div>

    <div id="lista-respostas"></div>
  </div>

</div>

<script type="module">
  // 1. Importando as ferramentas do Firebase direto do Google
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // 2. SUAS CREDENCIAIS DO FIREBASE
  const firebaseConfig = {
    apiKey: "AIzaSyAYVMQwv2z-x2uPbVhCvr1EKblpwdVSk8E",
    authDomain: "festa-da.firebaseapp.com",
    projectId: "festa-da",
    storageBucket: "festa-da.firebasestorage.app",
    messagingSenderId: "483665771874",
    appId: "1:483665771874:web:082f9c527d6e40f544003b"
  };

  // 3. Inicializando o Firebase e o Banco de Dados
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const SENHA_ADMIN = "helena8";
  let vemEscolha = null;

  // Como estamos usando "module", precisamos atrelar as funções ao "window" para o HTML enxergar
  window.ir = function(id) {
    document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
    document.getElementById(id).classList.add('ativa');
  }

  window.escolherVem = function(opcao) {
    vemEscolha = opcao;
    document.getElementById('btn-sim').classList.toggle('active', opcao === 'sim');
    document.getElementById('btn-nao').classList.toggle('active', opcao === 'nao');
    document.getElementById('campos-extras').style.display = opcao === 'sim' ? 'block' : 'none';
    document.getElementById('btn-confirmar').disabled = false;
  }

  window.confirmar = async function() {
    const nome = document.getElementById('f-nome').value.trim();
    if (!nome) { alert('Por favor, informe seu nome! 🦕'); return; }

    const btn = document.getElementById('btn-confirmar');
    btn.disabled = true;
    btn.textContent = "Enviando... ⏳"; 

    const registro = {
      nome,
      vem: vemEscolha,
      criancas: vemEscolha === 'sim' ? parseInt(document.getElementById('f-criancas').value) || 0 : 0,
      adultos:  vemEscolha === 'sim' ? parseInt(document.getElementById('f-adultos').value) || 0 : 0,
      recado: document.getElementById('f-recado').value.trim(),
      data: new Date().toLocaleString('pt-BR')
    };

    try {
      // 4. Salvando no banco de dados "respostas" do Firestore
      await addDoc(collection(db, "respostas"), registro);

      if (vemEscolha === 'sim') {
        document.getElementById('sucesso-emoji').textContent = '🦕';
        document.getElementById('sucesso-titulo').textContent = 'Uhuuu! Até lá! 🎉';
        document.getElementById('sucesso-texto').textContent = 'A Helena vai ficar super feliz de te ver no reino dos dinos e doces! 💜';
      } else {
        document.getElementById('sucesso-emoji').textContent = '🦖';
        document.getElementById('sucesso-titulo').textContent = 'Que pena! 😢';
        document.getElementById('sucesso-texto').textContent = 'Sentiremos sua falta no reino jurássico! Obrigado por avisar. 🦕';
      }

      ir('tela-sucesso');
    } catch (e) {
      console.error("Erro ao adicionar documento: ", e);
      alert("Ops! Deu um erro ao salvar. Tente novamente! 🦕");
    } finally {
      btn.textContent = "Confirmar agora! 🍬";
      btn.disabled = false;
    }
  }

  window.voltarInicio = function() {
    document.getElementById('f-nome').value = '';
    document.getElementById('f-recado').value = '';
    document.getElementById('f-criancas').value = 1;
    document.getElementById('f-adultos').value = 1;
    document.getElementById('btn-sim').classList.remove('active');
    document.getElementById('btn-nao').classList.remove('active');
    document.getElementById('campos-extras').style.display = 'none';
    document.getElementById('btn-confirmar').disabled = true;
    vemEscolha = null;
    ir('tela-convite');
  }

  window.abrirAdmin = async function() {
    const senha = document.getElementById('admin-senha').value;
    if (senha !== SENHA_ADMIN) { alert('Senha incorreta! 🦖'); return; }
    
    ir('tela-admin');
    const lista = document.getElementById('lista-respostas');
    lista.innerHTML = '<p class="empty-msg">Carregando os dinos... ⏳</p>';
    
    await carregarAdmin();
  }

  window.carregarAdmin = async function() {
    const lista = document.getElementById('lista-respostas');
    
    try {
      // 5. Buscando todas as respostas no banco de dados Firestore
      const querySnapshot = await getDocs(collection(db, "respostas"));
      const respostas = [];
      querySnapshot.forEach((doc) => {
        respostas.push(doc.data());
      });

      const confirmados = respostas.filter(r => r.vem === 'sim');
      const naoVem = respostas.filter(r => r.vem === 'nao');
      const totalCriancas = confirmados.reduce((a, r) => a + (r.criancas || 0), 0);

      document.getElementById('stat-confirmados').textContent = confirmados.length;
      document.getElementById('stat-criancas').textContent = totalCriancas;
      document.getElementById('stat-naovem').textContent = naoVem.length;

      if (respostas.length === 0) {
        lista.innerHTML = '<p class="empty-msg">Nenhuma confirmação ainda 🦖</p>';
        return;
      }

      lista.innerHTML = respostas.map(r => `
        <div class="resposta-card ${r.vem}">
          <div class="resposta-head">
            <span class="resposta-nome">${r.nome}</span>
            <span class="badge ${r.vem}">${r.vem === 'sim' ? 'Vai!' : 'Não vai'}</span>
          </div>
          ${r.vem === 'sim' ? `<div class="resposta-detail">👦 ${r.criancas} criança(s) · 👨‍👩‍👦 ${r.adultos} adulto(s)</div>` : ''}
          ${r.recado ? `<div class="resposta-recado">💬 "${r.recado}"</div>` : ''}
          <div class="resposta-data">${r.data}</div>
        </div>
      `).join('');
    } catch (e) {
      console.error("Erro ao carregar os dados: ", e);
      lista.innerHTML = '<p class="empty-msg" style="color:red;">Erro ao buscar no banco de dados! 🦖</p>';
    }
  }
</script>

</body>
</html>
